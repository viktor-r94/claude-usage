<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1c1c1e;
    color: #e8e8e3;
    padding: 16px;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .header-title { font-size: 14px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .plan-badge {
    font-size: 10px;
    font-weight: 500;
    background: #1e3a2e;
    color: #4caf84;
    padding: 2px 7px;
    border-radius: 10px;
  }
  .refresh-btn {
    background: none;
    border: none;
    color: #6e6e73;
    cursor: pointer;
    padding: 2px;
    display: flex;
  }
  .refresh-btn:hover { color: #a0a09b; }
  .refresh-btn.spinning svg { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: #6e6e73;
    text-transform: uppercase;
    letter-spacing: .04em;
    margin: 14px 0 8px;
  }

  .usage-item { margin-bottom: 12px; }
  .usage-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
  }
  .usage-name { font-size: 13px; font-weight: 500; }
  .usage-pct { font-size: 12px; color: #6e6e73; }
  .usage-sub { font-size: 11px; color: #6e6e73; margin-bottom: 5px; }
  .track {
    height: 5px;
    background: #2d2d2f;
    border-radius: 3px;
    overflow: hidden;
  }
  .fill {
    height: 100%;
    background: #4a90e2;
    border-radius: 3px;
    transition: width .3s ease;
  }
  .fill.warn { background: #e2a94a; }
  .fill.danger { background: #e24a4a; }

  .divider {
    height: 1px;
    background: #2a2a2c;
    margin: 12px 0;
  }

  .footer {
    font-size: 11px;
    color: #6e6e73;
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
  }

  /* states */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px 0;
    color: #6e6e73;
    font-size: 13px;
    text-align: center;
  }
  .btn {
    background: #4a90e2;
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 8px 20px;
    font-size: 13px;
    cursor: pointer;
  }
  .btn:hover { background: #3a80d2; }
</style>
</head>
<body>
<div class="header">
  <span class="header-title">Claude Usage</span>
  <div class="header-right">
    <span class="plan-badge" id="planBadge" style="display:none">Pro</span>
    <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()" title="Refresh">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M1 4v6h6M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
    </button>
  </div>
</div>

<div id="body"></div>

<script>
let lastUpdated = null

function fmtReset(val) {
  if (!val) return ''
  const d = new Date(val)
  const diff = d - Date.now()
  if (diff <= 0) return 'soon'
  const h = Math.floor(diff / 3600000)
  const m = Math.floor((diff % 3600000) / 60000)
  if (h >= 24) return d.toLocaleDateString('en-US', { weekday: 'short', hour: 'numeric', minute: '2-digit' })
  return h > 0 ? `Resets in ${h} hr ${m} min` : `Resets in ${m} min`
}

function fillClass(pct) {
  if (pct >= 90) return 'danger'
  if (pct >= 70) return 'warn'
  return ''
}

function usageItem(name, sub, pct, right) {
  return `<div class="usage-item">
    <div class="usage-top">
      <span class="usage-name">${esc(name)}</span>
      <span class="usage-pct">${right}</span>
    </div>
    ${sub ? `<div class="usage-sub">${esc(sub)}</div>` : ''}
    <div class="track"><div class="fill ${fillClass(pct)}" style="width:${Math.min(pct,100)}%"></div></div>
  </div>`
}

function pctOf(obj) {
  if (obj == null) return null
  if (typeof obj.utilization === 'number') return Math.round(obj.utilization * (obj.utilization <= 1 ? 100 : 1))
  const used = obj.used ?? obj.current ?? obj.count
  const max = obj.max ?? obj.limit ?? obj.maximum
  if (typeof used === 'number' && typeof max === 'number' && max > 0) return Math.round(used / max * 100)
  return null
}

function resetOf(obj) {
  const v = obj?.resets_at ?? obj?.reset_at ?? obj?.resetTime ?? obj?.reset_time ?? obj?.resetAt
  return v ? fmtReset(typeof v === 'number' && v < 1e12 ? v * 1000 : v) : ''
}

function prettyName(key) {
  return key.replace(/_/g, ' ').replace(/^./, c => c.toUpperCase())
}

function esc(s) {
  return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]))
}

function renderData({ org, results }) {
  let html = ''

  if (org?.plan) {
    const badge = document.getElementById('planBadge')
    badge.textContent = org.plan
    badge.style.display = ''
  }

  // Find the first endpoint that returned usable JSON
  const okEntry = Object.entries(results || {}).find(([, r]) => r.status === 200 && r.data && typeof r.data === 'object')

  if (okEntry) {
    const data = okEntry[1].data
    // Render every object in the payload that looks like a limit (has a computable pct)
    const entries = Object.entries(data).filter(([, v]) => pctOf(v) !== null)
    if (entries.length) {
      for (const [key, v] of entries) {
        const pct = pctOf(v)
        html += usageItem(prettyName(key), resetOf(v), pct, `${pct}% used`)
      }
      html += `<div class="divider"></div>`
    } else {
      html += `<pre style="font-size:10px;color:#6e6e73;white-space:pre-wrap;overflow:auto;max-height:300px">${JSON.stringify(data, null, 2)}</pre>`
    }
  } else {
    // Diagnostics: show what each endpoint said
    html += `<div class="section-label">Endpoint probe</div>`
    for (const [path, r] of Object.entries(results || {})) {
      html += `<div style="font-size:10px;color:#6e6e73;margin-bottom:6px"><b>${r.status}</b> ${path}</div>`
    }
  }

  lastUpdated = new Date()
  html += `<div class="footer"><span>Updated ${lastUpdated.toLocaleTimeString()}</span></div>`
  document.getElementById('body').innerHTML = html
  fitWindow()
}

function fitWindow() {
  requestAnimationFrame(() => window.api.resize(document.body.scrollHeight + 16))
}

async function doRefresh() {
  const btn = document.getElementById('refreshBtn')
  btn.classList.add('spinning')
  const data = await window.api.fetchUsage()
  btn.classList.remove('spinning')

  if (data.error === 'not_logged_in') {
    document.getElementById('planBadge').style.display = 'none'
    document.getElementById('body').innerHTML = `
      <div class="center">
        <p>Sign in to see your usage</p>
        <button class="btn" onclick="window.api.openLogin()">Sign in to Claude</button>
      </div>`
    fitWindow()
  } else if (data.error) {
    document.getElementById('body').innerHTML = `
      <div class="center" style="color:#e24a4a">
        <p>${esc(data.error)}</p>
        <button class="btn" onclick="doRefresh()">Retry</button>
      </div>`
    fitWindow()
  } else {
    renderData(data)
  }
}

window.api.onLoginDone(() => doRefresh())

// Refresh each time the popover opens (it gains focus when shown).
window.addEventListener('focus', doRefresh)
</script>
</body>
</html>
